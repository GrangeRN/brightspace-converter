<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brightspace NCLEX Question Converter | GrangeRN</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Pinned versions to prevent auto-update breakage -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            color: #1e293b;
            line-height: 1.6;
        }
        .app-container { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
        .header {
            display: flex; align-items: center; gap: 24px;
            padding-bottom: 32px; margin-bottom: 40px; border-bottom: 2px solid #e2e8f0;
        }
        .logo { max-width: 220px; height: auto; flex-shrink: 0; }
        .header-text h1 {
            font-family: 'Merriweather', serif; font-weight: 700;
            font-size: 1.75rem; color: #2C3E5B; margin-bottom: 8px;
        }
        .header-text p { color: #5B7A9C; font-size: 0.95rem; line-height: 1.5; }
        .card {
            background: white; border-radius: 16px; padding: 28px; margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            transition: box-shadow 0.2s ease;
        }
        .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04); }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .card-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1.25rem;
        }
        .card-icon.blue { background: linear-gradient(135deg, #5B7A9C 0%, #6d8dad 100%); }
        .card-icon.navy { background: linear-gradient(135deg, #2C3E5B 0%, #3d5270 100%); }
        .card-icon.green { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
        .card-title { font-family: 'Merriweather', serif; font-weight: 700; font-size: 1.1rem; color: #2C3E5B; }
        .instructions-list { display: grid; gap: 12px; }
        .instruction-item { display: flex; align-items: flex-start; gap: 12px; }
        .step-number {
            width: 28px; height: 28px; border-radius: 8px;
            background: linear-gradient(135deg, #5B7A9C 0%, #6d8dad 100%);
            color: white; display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.85rem; flex-shrink: 0;
        }
        .instruction-text { color: #475569; font-size: 0.95rem; padding-top: 3px; }
        .supported-types {
            margin-top: 16px; padding: 14px 18px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 10px; border-left: 4px solid #5B7A9C;
        }
        .supported-types strong { color: #2C3E5B; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; color: #374151; margin-bottom: 8px; font-size: 0.9rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        .input-field {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px;
            font-size: 0.95rem; font-family: inherit; transition: all 0.2s ease; background: #f8fafc;
        }
        .input-field:focus { outline: none; border-color: #5B7A9C; background: white; box-shadow: 0 0 0 3px rgba(91, 122, 156, 0.1); }
        select.input-field {
            cursor: pointer; appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center; background-repeat: no-repeat; background-size: 20px; padding-right: 40px;
        }
        .preview-box {
            margin-top: 16px; padding: 14px 18px; background: #1e293b; border-radius: 10px;
            font-family: Monaco, Consolas, "Courier New", monospace; font-size: 0.9rem; color: #94a3b8;
        }
        .preview-box span { color: #60a5fa; }
        .textarea-field {
            width: 100%; min-height: 280px; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px;
            font-family: Monaco, Consolas, "Courier New", monospace; font-size: 0.875rem;
            line-height: 1.6; resize: vertical; transition: all 0.2s ease; background: #f8fafc;
        }
        .textarea-field:focus { outline: none; border-color: #5B7A9C; background: white; box-shadow: 0 0 0 3px rgba(91, 122, 156, 0.1); }
        .textarea-field::placeholder { color: #94a3b8; }
        .button-row { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 28px; border: none; border-radius: 12px; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #2C3E5B 0%, #3d5270 100%); color: white; box-shadow: 0 4px 14px 0 rgba(44, 62, 91, 0.25); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px 0 rgba(44, 62, 91, 0.35); }
        .btn-secondary { background: linear-gradient(135deg, #5B7A9C 0%, #6d8dad 100%); color: white; box-shadow: 0 4px 14px 0 rgba(91, 122, 156, 0.25); }
        .btn-secondary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px 0 rgba(91, 122, 156, 0.35); }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: white; box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.25); }
        .btn-success:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px 0 rgba(16, 185, 129, 0.35); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.75); display: flex; align-items: center;
            justify-content: center; z-index: 1000; padding: 24px; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; border-radius: 20px; max-width: 600px; width: 100%;
            max-height: 80vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .modal-header {
            padding: 24px 28px; background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            border-radius: 20px 20px 0 0; color: white;
        }
        .modal-header h2 { font-family: 'Merriweather', serif; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
        .modal-body { padding: 28px; }
        .issue-list { margin-bottom: 24px; }
        .issue-item {
            display: flex; align-items: flex-start; gap: 12px; padding: 14px;
            background: #fef2f2; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #ef4444;
        }
        .issue-item:last-child { margin-bottom: 0; }
        .issue-icon { color: #ef4444; font-size: 1.25rem; flex-shrink: 0; }
        .issue-details { flex: 1; }
        .issue-title { font-weight: 600; color: #991b1b; margin-bottom: 4px; }
        .issue-reason { color: #b91c1c; font-size: 0.9rem; }
        .tip-box { padding: 18px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-radius: 12px; margin-bottom: 24px; }
        .tip-box h4 { color: #92400e; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .tip-box ul { margin-left: 28px; color: #a16207; }
        .tip-box li { margin-bottom: 6px; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .btn-modal-continue { background: linear-gradient(135deg, #2C3E5B 0%, #3d5270 100%); color: white; }
        .btn-modal-cancel { background: #e2e8f0; color: #475569; }
        .stats-row { display: flex; gap: 16px; margin-bottom: 16px; }
        .stat-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 20px; font-size: 0.85rem; color: #2C3E5B; font-weight: 500;
        }
        .stat-badge.success { background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); color: #166534; }
        .footer { text-align: center; padding: 32px 24px; color: #64748b; font-size: 0.85rem; margin-top: 40px; }
        .footer a { color: #5B7A9C; text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeIn 0.4s ease-out; }
        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .logo { max-width: 160px; }
            .header-text h1 { font-size: 1.5rem; }
            .button-row { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>

        function App() {
            const [courseCode, setCourseCode] = useState('');
            const [assessmentType, setAssessmentType] = useState('Exam');
            const [assessmentNumber, setAssessmentNumber] = useState('');
            const [inputText, setInputText] = useState('');
            const [outputCSV, setOutputCSV] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [unsupportedQuestions, setUnsupportedQuestions] = useState([]);
            const [parsedQuestions, setParsedQuestions] = useState([]);
            const [stats, setStats] = useState({ total: 0, supported: 0 });

            const getQuestionPrefix = () => {
                if (!assessmentNumber) return '';
                const prefix = assessmentType === 'Exam' ? 'E' : 'Q';
                return `${prefix}${assessmentNumber}`;
            };

            const escapeCSV = (text) => {
                if (!text) return '';
                let escaped = text.replace(/"/g, '""');
                if (escaped.includes(',') || escaped.includes('"') || escaped.includes('\n')) {
                    escaped = `"${escaped}"`;
                }
                return escaped;
            };

            const normalizeText = (text) => {
                let normalized = text;
                normalized = normalized.replace(/^Question\s*\d+[.:]\s*/gim, '');
                normalized = normalized.replace(/^Q\d+[.:]\s*/gim, '');
                normalized = normalized.replace(/(\S)\s+([b-f])\.\s+/g, '$1\n$2. ');
                normalized = normalized.replace(/(\S)\s+(Nursing Process:)/g, '$1\n$2');
                normalized = normalized.replace(/(\S)\s+(NCLEX Category:)/g, '$1\n$2');
                normalized = normalized.replace(/(\S)\s+(Tanner's Clinical Judgment:)/g, '$1\n$2');
                normalized = normalized.replace(/^~\s*Rationale:\s*(.+)$/gm, '~\nRationale: $1');
                return normalized;
            };

            const parseQuestions = (text) => {
                const normalized = normalizeText(text);
                const lines = normalized.split('\n').map(line => line.trim());
                const questions = [];
                let currentQuestion = null;
                let inRationale = false;
                let rationaleLines = [];

                for (let line of lines) {
                    if (line.toLowerCase().startsWith('title:')) {
                        if (currentQuestion && currentQuestion.title) {
                            if (rationaleLines.length > 0) {
                                currentQuestion.rationale = rationaleLines.join(' ').trim();
                            }
                            questions.push(currentQuestion);
                        }
                        currentQuestion = {
                            title: line.substring(6).trim(),
                            question: '',
                            options: [],
                            correctAnswers: [],
                            rationale: '',
                            metadata: { blooms: '', nursingProcess: '', nclex: '', tanners: '' }
                        };
                        inRationale = false;
                        rationaleLines = [];
                    }
                    else if (line === '~') { inRationale = true; }

                        const answers = line.replace(/correct answer:/i, '').trim();
                        if (currentQuestion) {
                            currentQuestion.correctAnswers = answers.split(',').map(a => a.trim().toLowerCase());
                        }
                    }
                    else if (line.includes("Bloom's Taxonomy Level:")) {
                        if (currentQuestion) currentQuestion.metadata.blooms = line.split(':').slice(1).join(':').trim();
                    }
                    else if (line.includes('Nursing Process:')) {
                        if (currentQuestion) currentQuestion.metadata.nursingProcess = line.split(':').slice(1).join(':').trim();
                    }
                    else if (line.includes('NCLEX Category:')) {
                        if (currentQuestion) currentQuestion.metadata.nclex = line.split(':').slice(1).join(':').trim();
                    }
                    else if (line.includes("Tanner's Clinical Judgment:")) {
                        if (currentQuestion) currentQuestion.metadata.tanners = line.split(':').slice(1).join(':').trim();
                    }
                    else if (line.match(/^[a-f][.)]\s/i)) {
                        const optionText = line.substring(3).trim();
                        if (currentQuestion) currentQuestion.options.push(optionText);
                    }
                    else if (inRationale && line.toLowerCase().startsWith('rationale:')) {
                        rationaleLines.push(line.replace(/rationale:/i, '').trim());
                    }
                    else if (inRationale && line && !line.includes(':')) {
                        rationaleLines.push(line);
                    }
                    else if (currentQuestion && !currentQuestion.options.length && line && !line.includes(':')) {
                        if (currentQuestion.question) {
                            currentQuestion.question += ' ' + line;
                        } else {
                            currentQuestion.question = line;
                        }
                    }
                }

                if (currentQuestion && currentQuestion.title) {
                    if (rationaleLines.length > 0) {
                        currentQuestion.rationale = rationaleLines.join(' ').trim();
                    }
                    questions.push(currentQuestion);
                }
                return questions;
            };

            const detectIssue = (q) => {
                if (q.question && (q.question.includes('_____') || q.question.toLowerCase().includes('fill in the blank'))) {
                    return 'Contains fill-in-the-blank format';
                }
                if (q.options.length === 0) {
                    return 'No answer choices found (a, b, c, d)';
                }
                if (q.correctAnswers.length === 0) {
                    return 'No correct answer specified';
                }
                if (!q.question || q.question.trim() === '') {
                    return 'No question text found';
                }
                return null;
            };
            // Map Blooms Taxonomy level to difficulty (1-5)
            const getBloomsDifficulty = (bloomsLevel) => {
                if (!bloomsLevel) return 1;
                const level = bloomsLevel.toLowerCase();
                // Level 1: Remember/Knowledge
                if (level.includes("remember") || level.includes("knowledge") || level.includes("recall")) return 1;
                // Level 2: Understand/Comprehension
                if (level.includes("understand") || level.includes("comprehension") || level.includes("comprehend")) return 2;
                // Level 3: Apply/Application
                if (level.includes("appl")) return 3;  // matches apply, application, applying, applied
                // Level 4: Analyze/Analysis
                if (level.includes("analy")) return 4;  // matches analyze, analysis, analyzing, analytical
                // Level 5: Evaluate/Create/Synthesis
                if (level.includes("evaluat") || level.includes("creat") || level.includes("synthesis") || level.includes("synthesiz")) return 5;
                return 1;  // Default to Remember if no match
            };


            const generateCSV = useCallback((questions, prefix) => {
                let csv = '';
                const optionLetters = ['a', 'b', 'c', 'd', 'e', 'f'];

                questions.forEach((q) => {
                    const isTF = q.options.length === 2 && 
                        q.options.some(o => o.toLowerCase() === 'true') && 
                        q.options.some(o => o.toLowerCase() === 'false');
                    
                    const isMC = !isTF && q.correctAnswers.length === 1;
                    const questionType = isTF ? 'TF' : (isMC ? 'MC' : 'MS');
                    const fullTitle = prefix ? `${prefix} - ${q.title}` : q.title;
                    
                    csv += `NewQuestion,${questionType},,,\n`;
                    csv += `Title,${escapeCSV(fullTitle)},,,\n`;
                    csv += `QuestionText,${escapeCSV(q.question)},,,\n`;
                    
                    let qPoints = assessmentType === 'Quiz' ? 5 : 1.6667;
                    csv += `Points,${qPoints},,,\n`;
                    const difficulty = getBloomsDifficulty(q.metadata.blooms);
                    csv += `Difficulty,${difficulty},,,
`;
                    
                    // Add scoring type for MS questions
                    if (questionType === 'MS') {
                        csv += `Scoring,RightMinusWrong,,,\n`;
                    }
                    
                    // Add randomize for MC and MS
                    if (questionType === 'MC' || questionType === 'MS') {
                        csv += `Randomize,1,,,\n`;
                    }
                    
                    if (isTF) {
                        const trueCorrect = q.correctAnswers.some(a => a.toLowerCase().includes('true'));
                        csv += `TRUE,${trueCorrect ? 100 : 0},,,\n`;
                        csv += `FALSE,${trueCorrect ? 0 : 100},,,\n`;
                    } else {
                        q.options.forEach((opt, idx) => {
                            const isCorrect = q.correctAnswers.includes(optionLetters[idx]);
                            const correctValue = isMC ? (isCorrect ? '100' : '0') : (isCorrect ? '1' : '0');
                            csv += `Option,${correctValue},${escapeCSV(opt)},,\n`;
                        });
                    }
                    
                    let feedbackText = q.rationale || '';
                    const metaParts = [];
                    if (q.metadata.blooms) metaParts.push(`Bloom's Taxonomy: ${q.metadata.blooms}`);
                    if (q.metadata.nursingProcess) metaParts.push(`Nursing Process: ${q.metadata.nursingProcess}`);
                    if (q.metadata.nclex) metaParts.push(`NCLEX Category: ${q.metadata.nclex}`);
                    if (q.metadata.tanners) metaParts.push(`Tanner's Clinical Judgment: ${q.metadata.tanners}`);
                    
                    if (metaParts.length > 0) {
                        if (feedbackText) feedbackText += ' ';
                        feedbackText += metaParts.join('. ');
                    }
                    
                    if (feedbackText) csv += `Feedback,${escapeCSV(feedbackText)},,,\n`;
                    csv += `,,,,\n`;
                });

                return csv;
            }, [assessmentType]);

            const handleGenerate = () => {
                const questions = parseQuestions(inputText);
                const supported = [];
                const unsupported = [];

                questions.forEach(q => {
                    const issue = detectIssue(q);
                    if (issue) unsupported.push({ ...q, issue });
                    else supported.push(q);
                });

                setStats({ total: questions.length, supported: supported.length });
                setParsedQuestions(supported);

                if (unsupported.length > 0) {
                    setUnsupportedQuestions(unsupported);
                    setShowModal(true);
                } else {
                    const csv = generateCSV(supported, getQuestionPrefix());
                    setOutputCSV(csv);
                }
            };

            const handleContinue = () => {
                const csv = generateCSV(parsedQuestions, getQuestionPrefix());
                setOutputCSV(csv);
                setShowModal(false);
            };

            const handleDownload = () => {
                const blob = new Blob([outputCSV], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0, 10);
                const filename = courseCode ? `${courseCode}-${timestamp}.csv` : `questions-${timestamp}.csv`;
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
            };

            const handleClear = () => {
                setInputText('');
                setOutputCSV('');
                setParsedQuestions([]);
                setStats({ total: 0, supported: 0 });
            };

            return (
                <div className="app-container">
                    <header className="header">
                        <img src={LOGO_BASE64} alt="GrangeRN Logo" className="logo" />
                        <div className="header-text">
                            <h1>Brightspace NCLEX Question Converter</h1>
                            <p>Create CSV documents from NCLEX question banks. Works with ChatGPT and Gemini.</p>
                        </div>
                    </header>

                    <div className="card">
                        <div className="card-header">
                            <div className="card-icon blue">📋</div>
                            <h2 className="card-title">Instructions</h2>
                        </div>
                        <div className="instructions-list">
                            <div className="instruction-item">
                                <span className="step-number">1</span>
                                <span className="instruction-text">Fill in the course code and assessment type</span>
                            </div>
                            <div className="instruction-item">
                                <span className="step-number">2</span>
                                <span className="instruction-text">Paste your AI-generated questions</span>
                            </div>
                            <div className="instruction-item">
                                <span className="step-number">3</span>
                                <span className="instruction-text">Click "Generate CSV" to convert</span>
                            </div>
                            <div className="instruction-item">
                                <span className="step-number">4</span>
                                <span className="instruction-text">Download and upload to Brightspace</span>
                            </div>
                        </div>
                        <div className="supported-types">
                            <strong>Supported:</strong> Multiple Choice (MC), Multi-Select/SATA (MS), True/False (TF)
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <div className="card-icon navy">⚙️</div>
                            <h2 className="card-title">Settings</h2>
                        </div>
                        <div className="form-row">
                            <div className="form-group">
                                <label className="form-label">Course Code</label>
                                <input type="text" className="input-field" placeholder="e.g., N359"
                                    value={courseCode} onChange={(e) => setCourseCode(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Assessment Type</label>
                                <select className="input-field" value={assessmentType}
                                    onChange={(e) => setAssessmentType(e.target.value)}>
                                    <option value="Exam">Exam</option>
                                    <option value="Quiz">Quiz</option>
                                </select>
                            </div>
                        </div>
                        <div className="form-group">
                            <label className="form-label">Assessment Number (Optional)</label>
                            <input type="text" className="input-field" placeholder="e.g., 2"
                                value={assessmentNumber} onChange={(e) => setAssessmentNumber(e.target.value)} />
                        </div>
                        {assessmentNumber && (
                            <div className="preview-box">
                                Preview: <span>{getQuestionPrefix()} - [Your Question Title]</span>
                            </div>
                        )}
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <div className="card-icon blue">📝</div>
                            <h2 className="card-title">Paste Your Questions</h2>
                        </div>
                        <textarea className="textarea-field"
                            placeholder="Paste your AI-generated questions here..."
                            value={inputText} onChange={(e) => setInputText(e.target.value)} />
                        <div className="button-row">
                            <button className="btn btn-primary" onClick={handleGenerate} disabled={!inputText.trim()}>
                                🔄 Generate CSV
                            </button>
                            <button className="btn btn-secondary" onClick={handleClear} disabled={!inputText && !outputCSV}>
                                🗑️ Clear All
                            </button>
                        </div>
                    </div>

                    {outputCSV && (
                        <div className="card">
                            <div className="card-header">
                                <div className="card-icon green">✅</div>
                                <h2 className="card-title">Generated CSV</h2>
                            </div>
                            <div className="stats-row">
                                <span className="stat-badge success">✓ {stats.supported} questions converted</span>
                            </div>
                            <textarea className="textarea-field" value={outputCSV} readOnly style={{background: '#f8fafc'}} />
                            <div className="button-row">
                                <button className="btn btn-success" onClick={handleDownload}>⬇️ Download CSV</button>
                            </div>
                        </div>
                    )}

                    {showModal && (
                        <div className="modal-overlay">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h2>⚠️ Some Questions Could Not Be Converted</h2>
                                </div>
                                <div className="modal-body">
                                    <div className="issue-list">
                                        {unsupportedQuestions.map((q, idx) => (
                                            <div key={idx} className="issue-item">
                                                <span className="issue-icon">⛔</span>
                                                <div className="issue-details">
                                                    <div className="issue-title">{q.title || `Question ${idx + 1}`}</div>
                                                    <div className="issue-reason">{q.issue}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="tip-box">
                                        <h4>💡 Tips:</h4>
                                        <ul>
                                            <li>Use multiple choice or SATA format</li>
                                            <li>Label answers a, b, c, d</li>
                                            <li>Include "Correct answer:" line</li>
                                        </ul>
                                    </div>
                                    <div className="modal-actions">
                                        <button className="btn btn-modal-cancel" onClick={() => setShowModal(false)}>❌ Cancel</button>
                                        <button className="btn btn-modal-continue" onClick={handleContinue}>
                                            ✅ Continue with {parsedQuestions.length} questions
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="footer">
                        <p>Built by <a href="https://grangern.com" target="_blank" rel="noopener noreferrer">GrangeRN</a> — Nursing Education & Beyond</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
